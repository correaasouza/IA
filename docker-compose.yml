services:
  postgres:
    image: postgres:16
    container_name: ia-postgres
    environment:
      POSTGRES_USER: ia
      POSTGRES_PASSWORD: ia
      POSTGRES_DB: ia
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "0.0.0.0:15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: ia-keycloak
    depends_on:
      - postgres
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ia
      KC_DB_PASSWORD: ia
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    command:
      - start-dev
      - --import-realm
    ports:
      - "0.0.0.0:18081:8080"
    volumes:
      - ./infra/realm-import.json:/opt/keycloak/data/import/realm-import.json:ro

  backend:
    build:
      context: ./backend
    container_name: ia-backend
    depends_on:
      - postgres
      - keycloak
    environment:
      APP_PROFILE: prod
      DB_URL: jdbc:postgresql://postgres:5432/ia
      DB_USER: ia
      DB_PASSWORD: ia
      # NOTE: Access the UI via http://${PUBLIC_HOST:-localhost}:15000 so Keycloak tokens have a matching "iss".
      KEYCLOAK_ISSUER_URI: http://${PUBLIC_HOST:-localhost}:18081/realms/ia
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/ia/protocol/openid-connect/certs
      APP_SECURITY_JWT_ACCEPTED_ISSUERS: http://${PUBLIC_HOST:-localhost}:18081/realms/ia,http://localhost:18081/realms/ia,http://host.docker.internal:18081/realms/ia,http://127.0.0.1:18081/realms/ia,http://${PUBLIC_HOST:-localhost}:8081/realms/ia,http://localhost:8081/realms/ia,http://host.docker.internal:8081/realms/ia,http://127.0.0.1:8081/realms/ia
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_REALM: ia
      KEYCLOAK_TARGET_REALM: ia
      KEYCLOAK_ADMIN_REALM: master
      KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      CORS_ALLOWED_ORIGINS: http://${PUBLIC_HOST:-localhost}:15000,http://localhost:15000,http://host.docker.internal:15000,http://${PUBLIC_HOST:-localhost}:4201,http://localhost:4201,http://host.docker.internal:4201
      TENANT_SEED_ADMIN_ENABLED: "true"
      TENANT_SEED_ADMIN_USERNAME: "admin-{tenantId}"
      TENANT_SEED_ADMIN_EMAIL: "admin{tenantId}@local"
      TENANT_SEED_ADMIN_PASSWORD: "admin123"
      MOVIMENTO_CONFIG_ENABLED: ${MOVIMENTO_CONFIG_ENABLED:-true}
      MOVIMENTO_CONFIG_STRICT_ENABLED: ${MOVIMENTO_CONFIG_STRICT_ENABLED:-false}
      MOVIMENTO_SEED_DEFAULTS_ENABLED: ${MOVIMENTO_SEED_DEFAULTS_ENABLED:-false}
    ports:
      - "0.0.0.0:18082:18082"

  frontend:
    build:
      context: ./frontend
    container_name: ia-frontend
    depends_on:
      - backend
      - keycloak
    ports:
      - "0.0.0.0:15000:80"

volumes:
  pg_data:
